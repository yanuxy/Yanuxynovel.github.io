<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center p-8">

    <header class="mb-10 text-center">
        <h1 class="text-4xl font-bold text-blue-400">Video AI Generator</h1>
        <p class="text-gray-400">Ubah teks menjadi video pendek secara instan</p>
    </header>

    <main class="w-full max-w-2xl bg-gray-800 p-6 rounded-xl shadow-2xl">
        <div class="mb-4">
            <label class="block mb-2 font-medium">Masukkan Prompt Cerita:</label>
            <textarea id="prompt" class="w-full p-3 bg-gray-700 rounded-lg border border-gray-600 focus:border-blue-500 outline-none h-32" placeholder="Contoh: Seorang penyihir di puncak gunung bersalju, gaya anime..."></textarea>
        </div>

        <button onclick="generateVideo()" id="genBtn" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-lg font-bold transition">
            Generate Video
        </button>

        <div id="loading" class="hidden mt-6 text-center animate-pulse text-yellow-400">
            Sedang memproses video... Mohon tunggu.
        </div>

        <div id="result" class="hidden mt-8">
            <h3 class="text-lg font-semibold mb-2">Hasil Video:</h3>
            <video id="videoPlayer" controls class="w-full rounded-lg border-2 border-blue-500 shadow-lg">
                Your browser does not support the video tag.
            </video>
            <a id="downloadBtn" href="#" download class="block mt-4 text-center text-sm text-blue-400 underline">Unduh Video</a>
        </div>
    </main>

    <script>
        async function generateVideo() {
            const prompt = document.getElementById('prompt').value;
            const btn = document.getElementById('genBtn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');

            if (!prompt) return alert("Harap isi prompt!");

            // Tampilkan Loading
            btn.disabled = true;
            loading.classList.remove('hidden');
            result.classList.add('hidden');

            try {
                // Catatan: Anda perlu mengganti URL & API Key dengan layanan asli (misal: Replicate/Fal.ai)
                // Ini adalah contoh struktur pemanggilan API
                console.log("Mengirim prompt:", prompt);
                
                // Simulasi delay proses AI
                setTimeout(() => {
                    loading.classList.add('hidden');
                    result.classList.remove('hidden');
                    btn.disabled = false;
                    
                    // Contoh hasil (menggunakan video placeholder)
                    document.getElementById('videoPlayer').src = "https://www.w3schools.com/html/mov_bbb.mp4";
                }, 5000);

            } catch (error) {
                alert("Terjadi kesalahan teknis.");
                btn.disabled = false;
                loading.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
